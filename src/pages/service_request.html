<!doctype html>
<html lang="en">
	<head>
		<title>Service Request</title>
		<link rel="stylesheet" href="../css/main.css" />
		<link rel="stylesheet" href="../css/service_request.css" />
	</head>
	<body>
		<header>
			<img id="logo" src="../../images/logo192.png" />
			<h1>Service Request</h1>
		</header>
		<main>
			<form>
				<select id="category" required name="category">
					<option value="">--Please choose a category--</option>
				</select>
				<textarea
					id="description"
					required
					cols="30"
					rows="10"
				></textarea>
				<img id="preview" style="display: none" />
				<label for="image">
					Choose an image to upload (PNG, JPEG, JPG)
				</label>
				<input
					id="image"
					required
					type="file"
					accept="image/png, image/jpeg, image/jpg"
				/>
				<button>Submit</button>
			</form>
		</main>
		<footer>
			<p>© 2026 BUBS-Wits.</p>
			<a href="https://github.com/BUBS-Wits">Github</a>
		</footer>
		<script
			defer
			type="module"
			src="../js/service_request.js"
			fetchpriority="high"
		></script>
	</body>
</html>
